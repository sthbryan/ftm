name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build frontend
        run: |
          cd web-svelte && bun install && bun run build
          mkdir -p ../desktop/frontend/dist
          cp -r dist/* ../desktop/frontend/dist/
          cp -r dist/* ../internal/web/static/
      
      - name: Build
        run: go build -v ./...
      
      - name: Test
        run: go test -v ./...
