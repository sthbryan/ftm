name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.22'
  BUN_VERSION: '1.3'

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Build frontend
        run: |
          cd web-svelte && bun install && bun run build
          mkdir -p ../desktop/frontend/dist
          cp -r dist/* ../desktop/frontend/dist/
          cp -r dist/* ../internal/web/static/
      
      - name: Build
        run: go build -v $(go list ./... | grep -v '/desktop')
      
      - name: Test
        run: go test -v $(go list ./... | grep -v '/desktop')
