name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.22'
  BUN_VERSION: '1.3'

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Build frontend
        run: |
          cd web-svelte && bun install && bun run build
          mkdir -p ../desktop/frontend/dist
          cp -r dist/* ../desktop/frontend/dist/
          cp -r dist/* ../internal/web/static/

      - name: Test Svelte
        run: cd web-svelte && bun test
      
      - name: Build
        run: go build -v $(go list ./... | grep -v '/desktop')
      
      - name: Test
        run: go test -v $(go list ./... | grep -v '/desktop')

  build-desktop:
    name: Build Desktop (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            suffix: darwin
            platform: darwin/arm64
          - os: ubuntu-latest
            suffix: linux
            platform: linux/amd64
          - os: windows-latest
            suffix: windows
            platform: windows/amd64
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build Svelte
        run: cd web-svelte && bun install && bun run build

      - name: Copy assets
        run: |
          mkdir -p desktop/frontend/dist
          mkdir -p desktop/build
          cp -r web-svelte/dist/* desktop/frontend/dist/
          cp -r web-svelte/dist/* internal/web/static/
          cp desktop/icon.png desktop/build/appicon.png

      - name: Build Desktop
        run: cd desktop && wails build -s -platform ${{ matrix.platform }} -tags webkit2_41

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftm-desktop-${{ matrix.suffix }}
          path: desktop/build/bin
