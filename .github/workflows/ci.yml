name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build
        run: go build -v ./...
      
      - name: Test
        run: go test -v ./...

  build-tauri:
    name: Build Tauri
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v3
        with:
          bun-version: '1'
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Build Go backend
        shell: bash
        run: |
          cd desktop/go-api/cmd/server
          go build -o go-backend .
          cp go-backend ../../../src-tauri/go-backend
      
      - name: Install JS dependencies with bun
        run: |
          cd desktop
          bun install
      
      - name: Build Tauri
        run: |
          cd desktop
          bun run tauri build
