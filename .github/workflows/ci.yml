name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build
        run: go build -v ./...
      
      - name: Test
        run: go test -v ./...

  build-tauri:
    name: Build Tauri
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        uses: cargo-bins/cargo-binstall@v1
        with:
          packages: tauri-cli@^2

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Build web frontend
        shell: bash
        run: |
          cd web-svelte && bun install && bun run build
          rm -rf ../internal/web/static
          cp -r dist ../internal/web/static
          touch ../internal/web/static/.gitkeep
      
      - name: Build Go backend
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/bin
          cd desktop/src-tauri
          CARGO_MANIFEST_DIR=$(pwd) go build -o bin/ftm ../../cmd/ftm
      
      - name: Build Tauri
        run: |
          cd desktop/src-tauri
          cargo tauri build
