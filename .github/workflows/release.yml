name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.22'
  BUN_VERSION: '1.3'

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-x64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: macos-x64
          - goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-x64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Build web frontend
        shell: bash
        run: |
          cd web-svelte && bun install && bun run build
          rm -rf ../internal/web/static
          cp -r dist ../internal/web/static
          touch ../internal/web/static/.gitkeep

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o ftm-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/ftm
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftm-${{ matrix.suffix }}
          path: ftm-${{ matrix.suffix }}${{ matrix.ext }}

  build-desktop:
    name: Build Desktop (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            suffix: darwin
            platform: darwin/arm64
          - os: macos-13
            suffix: darwin-amd64
            platform: darwin/amd64
          - os: ubuntu-latest
            suffix: linux
            platform: linux/amd64
          - os: windows-latest
            suffix: windows
            platform: windows/amd64
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Install Wails (macOS)
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-13'
        run: brew install wails

      - name: Install Wails (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -sSL https://github.com/wailsapp/wails/releases/download/v2.11.0/wails-linux-amd64.tar.gz -o wails.tar.gz
          tar -xzf wails.tar.gz
          sudo mv wails-linux-amd64/wails /usr/local/bin/
          rm -rf wails.tar.gz wails-linux-amd64

      - name: Install Wails (Windows)
        if: matrix.os == 'windows-latest'
        run: winget install Wails.Wails

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build Svelte
        run: cd web-svelte && bun install && bun run build

      - name: Copy assets
        shell: bash
        run: |
          mkdir -p desktop/frontend/dist
          mkdir -p desktop/build
          cp -r web-svelte/dist/* desktop/frontend/dist/
          cp -r web-svelte/dist/* internal/web/static/
          cp desktop/icon.png desktop/build/appicon.png

      - name: Build Desktop
        run: cd desktop && wails build -s -platform ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftm-desktop-${{ matrix.suffix }}
          path: |
            desktop/build/bin/ftm.app
            desktop/build/bin/ftm
            desktop/build/bin/ftm.exe

  release:
    name: Create Release
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*